<div class="stats-view">
  <form id="statsForm" class="stats-form stats-panel">
    <label>
      Aggregation Level
      <select id="agg_level" name="agg_level">
        <option value="Driver" selected>Driver</option>
        <option value="Team">Team</option>
        <option value="Engine">Engine</option>
      </select>
    </label>

    <label>
      Season
      <select id="season" name="season">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
        <option value="2019">2019</option>
        <option value="2018">2018</option>
        <option value="2017">2017</option>
        <option value="2016">2016</option>
        <option value="2015">2015</option>
        <option value="2014">2014</option>
        <option value="2013">2013</option>
      </select>
    </label>

    <button type="submit">Load</button>
  </form>

  <div id="statsLoading" class="stats-loading">Loading...</div>
  <div id="statsError" class="stats-error"></div>

  <div id="statsTableWrap" class="stats-table-wrap stats-panel">
    <table id="statsTable">
      <thead>
        <tr id="statsHeader"></tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
  </div>
</div>

<style>
.stats-view { margin-top: 1rem; }
.stats-panel {
  border: 1px solid var(--card-separator-color);
  border-radius: var(--card-border-radius);
  background: var(--card-background);
  box-shadow: var(--shadow-l1);
}

.stats-form { display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; padding: 1rem; }
.stats-form label { display: flex; flex-direction: column; gap: .45rem; font-size: .92rem; color: var(--card-text-color-secondary); }
.stats-form select, .stats-form button {
  padding: .55rem .8rem;
  border-radius: .55rem;
  border: 1px solid var(--card-separator-color);
  background: var(--body-background);
  color: var(--card-text-color-main);
}
.stats-form button {
  background: var(--accent-color);
  color: white;
  border-color: var(--accent-color);
  font-weight: 600;
  cursor: pointer;
}
.stats-form button:hover { filter: brightness(0.95); }

.stats-loading, .stats-error { display: none; margin-top: .9rem; padding: .7rem .85rem; border-radius: .55rem; }
.stats-loading { background: var(--body-background); color: var(--card-text-color-secondary); border: 1px dashed var(--card-separator-color); }
.stats-error { background: rgba(176, 0, 32, .08); color: #b00020; border: 1px solid rgba(176, 0, 32, .28); }

.stats-table-wrap { display: none; overflow-x: auto; margin-top: 1rem; }
#statsTable { width: 100%; border-collapse: collapse; font-size: 60%; line-height: 1.35; }
#statsTable th, #statsTable td {
  padding: .62rem .78rem;
  border-bottom: 1px solid var(--card-separator-color);
  text-align: left;
  white-space: nowrap;
}
#statsTable th {
  cursor: pointer;
  background: var(--body-background);
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 1;
}
#statsTable th.sort-asc::after,
#statsTable th.sort-desc::after {
  margin-left: .35rem;
  color: var(--card-text-color-secondary);
}
#statsTable th.sort-asc::after { content: "▲"; }
#statsTable th.sort-desc::after { content: "▼"; }
#statsTable tr:nth-child(even) { background: rgba(127, 127, 127, .05); }
</style>

<script>
const STATS_ENDPOINT_URL = 'https://stats-endpoint-standard-ujzabdesxa-uc.a.run.app';

const COLUMN_TOOLTIPS = {

  R: 'R: Total Races',
  Laps: 'Laps: Total Laps Completed ',
  SP: 'SP: Average Starting Position',
  FP: 'FP: Average Finishing Position',
  PG: 'PG: Average Positions Gained',
  DNF: 'DNF: Did Not Finish Count',
  W: 'W: Race Wins',
  POD: 'POD: Podiums (Top 3 Finishes)',
  T10: 'T10: Top-10 Finishes',
  Pts: 'Pts: Championship Points'
};

let statsData = [];
let sortColumn = null;
let sortDirection = 'desc';

function getColumnTooltip(column) {
  return COLUMN_TOOLTIPS[column] || '';
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { agg_level: p.get('agg_level') || 'Driver', season: p.get('season') || '2026' };
}

function setParams(agg_level, season) {
  const u = new URL(window.location);
  u.searchParams.set('agg_level', agg_level);
  u.searchParams.set('season', season);
  window.history.replaceState({}, '', u);
}

async function loadStats(agg_level, season) {
  const loading = document.getElementById('statsLoading');
  const error = document.getElementById('statsError');
  const wrap = document.getElementById('statsTableWrap');
  loading.style.display = 'block';
  error.style.display = 'none';
  wrap.style.display = 'none';

  try {
    const r = await fetch(`${STATS_ENDPOINT_URL}?agg_level=${agg_level}&season=${season}`);
    const payload = await r.json();
    if (!payload.success || !Array.isArray(payload.data)) throw new Error(payload.error || 'Failed to load stats');
    statsData = payload.data;
    renderTable();
    wrap.style.display = 'block';
  } catch (e) {
    error.textContent = `Error loading stats: ${e.message}`;
    error.style.display = 'block';
  } finally {
    loading.style.display = 'none';
  }
}

function renderTable() {
  const header = document.getElementById('statsHeader');
  const body = document.getElementById('statsBody');
  header.innerHTML = '';
  body.innerHTML = '';

  if (statsData.length === 0) {
    body.innerHTML = '<tr><td>No data available</td></tr>';
    return;
  }

  const columns = Object.keys(statsData[0]);
  columns.forEach((col) => {
    const th = document.createElement('th');
    th.textContent = col;
    th.title = getColumnTooltip(col);
    th.onclick = () => sortBy(col);
    if (sortColumn === col) th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
    header.appendChild(th);
  });

  statsData.forEach((row) => {
    const tr = document.createElement('tr');
    columns.forEach((col) => {
      const td = document.createElement('td');
      td.textContent = row[col] ?? '-';
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function sortBy(column) {
  if (sortColumn === column) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  else { sortColumn = column; sortDirection = 'desc'; }

  statsData.sort((a, b) => {
    const av = a[column] ?? 0;
    const bv = b[column] ?? 0;
    const an = Number(av);
    const bn = Number(bv);
    if (!Number.isNaN(an) && !Number.isNaN(bn)) return sortDirection === 'asc' ? an - bn : bn - an;
    return sortDirection === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  renderTable();
}

document.getElementById('statsForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const agg_level = document.getElementById('agg_level').value;
  const season = document.getElementById('season').value;
  setParams(agg_level, season);
  loadStats(agg_level, season);
});

document.addEventListener('DOMContentLoaded', () => {
  const { agg_level, season } = getParams();
  document.getElementById('agg_level').value = agg_level;
  document.getElementById('season').value = season;
  loadStats(agg_level, season);
});
</script>
